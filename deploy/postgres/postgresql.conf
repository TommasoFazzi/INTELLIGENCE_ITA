# =============================================================================
# PostgreSQL Custom Configuration — INTELLIGENCE_ITA
# =============================================================================
# Tuned for PostGIS spatial workloads on Hetzner CAX31 (8GB ARM64, NVMe SSD).
# Mounted via docker-compose: postgres -c config_file=/etc/postgresql/custom.conf
#
# NOTE: This file only overrides specific parameters. All other PostgreSQL
# defaults from the pgvector:pg17 base image remain in effect.
# =============================================================================

# --- Listeners (required when using custom config_file) ---
listen_addresses = '*'
port = 5432

# --- Memory: Spatial Query Performance ---
# PostGIS ST_DWithin/ST_Intersects require sort buffers for distance calculations
# and hash joins for multi-table spatial queries. Default 4MB causes temp disk writes.
work_mem = 32MB

# Speeds up VACUUM ANALYZE on geometry columns and GIST index creation
maintenance_work_mem = 128MB

# Shared buffers: ~25% of 8GB total RAM
shared_buffers = 2GB

# Planner hint: total cache available (OS page cache + shared_buffers)
effective_cache_size = 4GB

# --- Storage: NVMe SSD optimization ---
# Hetzner CAX31 uses NVMe — random reads are nearly as fast as sequential
random_page_cost = 1.1

# --- WAL: Moderate write performance ---
wal_buffers = 64MB
checkpoint_completion_target = 0.9

# --- Logging ---
log_min_duration_statement = 1000
log_statement = 'none'
