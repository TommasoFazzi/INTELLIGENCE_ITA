# PDF Sources Configuration
# Institutional documents for intelligence analysis
# These PDFs are ingested and converted to articles, then processed through
# the standard NLP pipeline (process_nlp.py -> load_to_database.py)

pdf_sources:
  # SIPRI (Stockholm International Peace Research Institute)
  - name: "SIPRI Military Expenditure Database"
    publisher: "SIPRI"
    url: "https://sipri.org/sites/default/files/SIPRI%20Military%20Expenditure%20Database%202024.pdf"
    category: "intelligence"
    subcategory: "defense"
    check_interval_days: 365

  - name: "SIPRI Yearbook 2024"
    publisher: "SIPRI"
    url: "https://sipri.org/sites/default/files/SIPRI%20Yearbook%202024%20Summary%20(English).pdf"
    category: "intelligence"
    subcategory: "defense"
    check_interval_days: 365

  # IISS (International Institute for Strategic Studies)
  - name: "IISS Military Balance 2024"
    publisher: "IISS"
    url: "https://www.iiss.org/publications/the-military-balance/"
    category: "intelligence"
    subcategory: "defense"
    check_interval_days: 365

  # NATO
  - name: "NATO Strategic Concept 2022"
    publisher: "NATO"
    url: "https://www.nato.int/nato_static_fl2014/assets/pdf/2022/6/pdf/290622-strategic-concept.pdf"
    category: "intelligence"
    subcategory: "defense"
    check_interval_days: 180

  # Congressional Research Service (CRS)
  - name: "CRS Report on Russia"
    publisher: "CRS"
    url: "https://crsreports.congress.gov/product/pdf/R/R43301"
    category: "intelligence"
    subcategory: "geopolitics"
    check_interval_days: 90

  # European Commission
  - name: "European Union Strategic Compass"
    publisher: "European Union"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:52022DC0051"
    category: "intelligence"
    subcategory: "geopolitics"
    check_interval_days: 180

  # US State Department
  - name: "US National Security Strategy"
    publisher: "US Government"
    url: "https://www.whitehouse.gov/briefing-room/statements-releases/2022/10/12/fact-sheet-national-security-strategy/"
    category: "intelligence"
    subcategory: "geopolitics"
    check_interval_days: 365

# Instructions:
# 1. Add URLs to institutional documents (SIPRI, IISS, CRS, etc.)
# 2. Run: python scripts/ingest_pdfs.py --all
# 3. PDFs are extracted and automatically passed to process_nlp.py
# 4. No schema changes required — uses existing article dict structure
