# PDF Sources Configuration
# =========================
# Institutional documents for the PDF Deep Library layer.
# Each source is ingested via PDFIngestor, processed through NLP, and loaded into PostgreSQL.
#
# Fields:
#   url:          Direct PDF download URL (used as articles.link for deduplication)
#   title:        Document title
#   publisher:    Organization name (maps to articles.source as "pdf:{publisher}")
#   category:     Thematic category
#   subcategory:  Specific sub-category
#   cadence:      Update frequency (annual, quarterly, monthly) — informational only
#   published:    Publication date (ISO) — optional, defaults to ingestion date
#
# Usage:
#   python scripts/ingest_pdfs.py --all              # Ingest all sources
#   python scripts/ingest_pdfs.py --all --dry-run    # Preview without saving

pdf_sources:
